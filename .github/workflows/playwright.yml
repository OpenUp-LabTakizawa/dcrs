name: 🎭 Playwright Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "app/**"
      - "public/**"
      - "test/**"
      - ".dockerignore"
      - "bun.lock"
      - "Dockerfile"
      - "package.json"
      - "proxy.ts"
      - "*config.*"
  push:
    paths:
      - "app/**"
      - "public/**"
      - "test/**"
      - ".dockerignore"
      - "bun.lock"
      - "Dockerfile"
      - "package.json"
      - "proxy.ts"
      - "*config.*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      rustfs:
        image: rustfs/rustfs
        env:
          RUSTFS_ROOT_USER: rustfs
          RUSTFS_ROOT_PASSWORD: rustfs123
        options: >-
          --health-cmd "curl -f http://127.0.0.1:9000/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 9000:9000
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      DB_TYPE: postgres
      BETTER_AUTH_URL: http://localhost:3000
      S3_ACCESS_KEY_ID: rustfs
      S3_SECRET_ACCESS_KEY: rustfs123
      S3_REGION: us-east-1
      S3_BUCKET: dcrs-dev
      S3_ENDPOINT: http://localhost:9000

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.SHA }}
        env:
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: 🐣 Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: 📦 Install dependencies
        run: bun i

      - name: 🔑 Generate Better Auth Secret
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - name: 🗃️ Run database migrations
        run: bun run migrate

      - name: 🪣 Create S3 bucket
        run: bun -e "
          import { CreateBucketCommand, S3Client } from '@aws-sdk/client-s3';
          const s3 = new S3Client({ credentials:{ accessKeyId:'rustfs', secretAccessKey:'rustfs123' }, region:'us-east-1', endpoint:'http://localhost:9000', forcePathStyle:true });
          await s3.send(new CreateBucketCommand({ Bucket:'dcrs-dev' }));
          "

      - name: 🧩 Build app
        run: bun run build

      - name: 🎭 Install Playwright Browsers
        run: bun playwright install --with-deps

      - name: 🧪 Run Playwright tests
        run: bun playwright test


      - name: 🆙 Upload Test Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
