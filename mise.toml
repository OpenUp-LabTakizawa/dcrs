[tools]
bun = "latest"
pitchfork = "latest"
rumdl = "latest"

[tasks."dev:up"]
description = "Start local dev environment"
run = "bun run scripts/dev-up.ts"

[tasks."dev:reset"]
description = "Reset local dev environment (delete volumes)"
run = """
docker compose down -v
bun run scripts/dev-up.ts
bun run migrate
"""

[tasks.lint]
run = ["bun lint:fix --unsafe", "mise lint:md"]

[tasks."lint:md"]
description = "Check markdown files for linting issues"
run = "rumdl check --fix ."

[tasks.update]
description = "Update bun dependencies and reinstall"
run = ["bun update", "bun i", "mise deps"]

[deps.bun]
auto = true

[hooks]
enter = ["mise upgrade -q", "mise deps -q"]

[settings]
experimental = true
